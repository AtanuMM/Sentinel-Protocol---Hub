version: '3.8'

services:
# 1. S3 SIMULATOR (MinIO AIStor Enterprise Free Tier)
  # UI: http://localhost:9001 | API: http://localhost:9000
  minio:
    image: quay.io/minio/aistor/minio:latest
    container_name: sentinel-s3
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./minio_data:/data
      # SENIOR DEV WARNING: The minio.license file MUST exist in the same folder 
      # as your docker-compose.yml BEFORE you start the container.
      - ./minio.license:/minio.license:ro
    command: server /data --console-address ":9001" --license /minio.license

  # 2. THE TRACE DATABASE (Aurora PostgreSQL Simulation)
  # Host: localhost | Port: 5432
  db:
    image: postgres:15
    container_name: sentinel-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: sentinel_mdm
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # 3. FILE TAGGING CACHE (Deduplication Logic)
  # Port 6380 used to avoid conflict with your local Redis
  redis:
    image: redis:alpine
    container_name: sentinel-cache
    ports:
      - "6380:6379"
  
  redis-insight:
    image: redis/redisinsight:latest
    container_name: sentinel-redis-insight
    ports:
      - "8001:5540"
    environment:
      # This JSON string automatically adds your Redis service to the UI on startup
      - REDISINSIGHT_HOST=0.0.0.0
      - REDISINSIGHT_PORT=5540
      - REDIS_HOSTS=Sentinel-Cache:redis:6379
    restart: always
    depends_on:
      - redis

  # 4. KAFKA CLUSTER (KRaft Mode - No ZooKeeper Required)
  # Internal: kafka:29092 | External: localhost:9092
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: sentinel-kafka
    ports:
      - "9092:9092"
    environment:
      # Node Configuration
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      # Listeners
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      # Cluster Setup
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk' # Fixed UUID for POC persistence

  # 5. KAFKA VISUALIZER (Web UI)
  # Access at: http://localhost:8080
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sentinel-kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: sentinel-kraft-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
  
  # 7. GREENMAIL (Test IMAP/SMTP server)
  # SMTP: localhost:3025 | IMAP: localhost:3143 | IMAPS: localhost:3993
  greenmail:
    image: greenmail/standalone:2.0.1
    container_name: sentinel-greenmail
    ports:
      - "3025:3025"
      - "3143:3143"
      - "3993:3993"
    environment:
      GREENMAIL_OPTS: >-
        -Dgreenmail.setup.test.smtp
        -Dgreenmail.setup.test.imap
        -Dgreenmail.setup.test.imaps
        -Dgreenmail.hostname=0.0.0.0
        -Dgreenmail.users=alice:secret123@hitpa.local,claims:claims-pass@hitpa.local

  # 8. ROUNDCUBE (Browser UI for the GreenMail mailboxes)
  # Access at: http://localhost:8888
  # Login as: alice@hitpa.local / secret123  (or claims@hitpa.local / claims-pass)
  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: sentinel-roundcube
    depends_on:
      - greenmail
    ports:
      - "8888:80"
    environment:
      ROUNDCUBEMAIL_DEFAULT_HOST: greenmail
      ROUNDCUBEMAIL_DEFAULT_PORT: 3143
      ROUNDCUBEMAIL_SMTP_SERVER: greenmail
      ROUNDCUBEMAIL_SMTP_PORT: 3025
      ROUNDCUBEMAIL_DB_TYPE: sqlite
      ROUNDCUBEMAIL_PLUGINS: archive,zipdownload
    volumes:
      - roundcube_data:/var/roundcube/db

volumes:
  roundcube_data:

