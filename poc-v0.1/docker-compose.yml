version: '3.8'

services:
  # 1. S3 SIMULATOR (MinIO with Web UI)
  # UI: http://localhost:9001 | API: http://localhost:9000
  minio:
    image: minio/minio
    container_name: sentinel-s3
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: SuperSecret123
    volumes:
      - ./minio_data:/data
    command: server /data --console-address ":9001"

  # 2. THE TRACE DATABASE (Aurora PostgreSQL Simulation)
  # Host: localhost | Port: 5432
  db:
    image: postgres:15
    container_name: sentinel-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: sentinel_mdm
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # 3. FILE TAGGING CACHE (Deduplication Logic)
  # Port 6380 used to avoid conflict with your local Redis
  redis:
    image: redis:alpine
    container_name: sentinel-cache
    ports:
      - "6380:6379"

  # 4. KAFKA CLUSTER (KRaft Mode - No ZooKeeper Required)
  # Internal: kafka:29092 | External: localhost:9092
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: sentinel-kafka
    ports:
      - "9092:9092"
    environment:
      # Node Configuration
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      # Listeners
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      # Cluster Setup
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk' # Fixed UUID for POC persistence

  # 5. KAFKA VISUALIZER (Web UI)
  # Access at: http://localhost:8080
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sentinel-kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: sentinel-kraft-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # 6. THE HARVESTER (Sentinel Node.js Pod) - ON HOLD
